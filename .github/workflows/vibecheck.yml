name: vibeCheck

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'
  pull_request:
    branches: [master]

permissions:
  contents: write
  issues: write
  security-events: write
  pull-requests: write

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run vibeCheck
        uses: RhoMancer/vibecheck@abd1f3b3227b6b90c0ed7085be9f35e7b0410caf
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          severity_threshold: "medium"
          confidence_threshold: "medium"
          create_config_pr: "true"
