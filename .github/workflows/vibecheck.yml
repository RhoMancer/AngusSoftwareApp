name: vibeCheck

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'
  pull_request:
    branches: [master]

permissions:
  contents: write
  issues: write
  security-events: write
  pull-requests: write

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run vibeCheck
        uses: RhoMancer/vibecheck@8da6dadfc49e2c679ae34ef5125510bbad5ae0b8
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          severity_threshold: "medium"
          confidence_threshold: "medium"
          create_config_pr: "true"
