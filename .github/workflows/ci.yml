name: CI

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: temurin

      - name: Configure GPR credentials
        run: |
          mkdir -p ~/.gradle
          echo "githubUser=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "githubToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "githubOwner=RhoMancer" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew :composeApp:compileKotlinDesktop :composeApp:compileKotlinAndroid

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: temurin

      - name: Configure GPR credentials
        run: |
          mkdir -p ~/.gradle
          echo "githubUser=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "githubToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "githubOwner=RhoMancer" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew :composeApp:lintDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: '**/build/reports/lint-results-*.html'
