name: CI

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 23
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '23'
          distribution: temurin
          cache: gradle

      - name: Configure GPR credentials
        run: |
          mkdir -p ~/.gradle
          echo "githubUser=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "githubToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "githubOwner=RhoMancer" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew :composeApp:compileKotlinWasmJs :composeApp:compileDebugKotlinAndroid

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: '**/build/reports/tests/'

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 23
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '23'
          distribution: temurin
          cache: gradle

      - name: Configure GPR credentials
        run: |
          mkdir -p ~/.gradle
          echo "githubUser=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "githubToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "githubOwner=RhoMancer" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew :composeApp:lintDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-results
          path: '**/build/reports/lint-results-*.html'
