#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
org.gradle.jvmargs=-Xmx3072M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=false
# Build-failure analysis: enable by default so failed builds print suggestions. Disable per-run with -PbuildFailureEnabled=false.
buildFailureEnabled=true
buildFailureModel=qwen3-coder:30b
buildFailureTimeoutSec=120
# To temporarily enable configuration cache (disables end-of-build analysis listener), run with --configuration-cache
# Rationale: the listener is skipped when configuration cache is requested.
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

# GitHub Packages (owner/credentials)
# Owner of GitHub Packages org/user hosting Angus artifacts.
githubOwner=RhoMancer
# Optional: if not provided here, settings.gradle.kts falls back to environment variables:
#   GITHUB_USER and GITHUB_TOKEN
# Uncomment to override:
# githubUser=
# githubToken=
