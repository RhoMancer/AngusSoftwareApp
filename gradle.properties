#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
org.gradle.jvmargs=-Xmx3072M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=false
# AI Doctor: enable by default so failed builds trigger analysis. Disable per-run with -PaiDoctor=false.
aiDoctor=true
# To temporarily enable configuration cache (disables AI Doctor listener), run with --configuration-cache
# Rationale: AI Doctor uses a buildFinished listener which Gradle skips when configuration cache is requested.
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true