kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
angusGradleTools = { id = "com.angussoftware.gradle-tools", version.ref = "angusSoftware-gradle" }
angusGradleTools-coverage = { id = "com.angussoftware.gradle-tools.coverage"}
