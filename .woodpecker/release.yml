when:
  - event: push
    branch: [release/*]

steps:
  deploy-web:
    image: localhost:5000/ci-theming-jdk23:latest
    commands:
      # Configure GPR credentials
      - |
        mkdir -p ~/.gradle
        echo "githubUser=${GPR_USERNAME}" >> ~/.gradle/gradle.properties
        echo "githubToken=${GPR_TOKEN}" >> ~/.gradle/gradle.properties
      - chmod +x gradlew
      # Build Wasm distribution
      - ./gradlew --no-daemon :composeApp:wasmJsBrowserDistribution
      # Prepare gh-pages content
      - |
        touch composeApp/build/dist/wasmJs/productionExecutable/.nojekyll
        cp -r static/. composeApp/build/dist/wasmJs/productionExecutable/
      # Deploy to gh-pages branch
      - |
        cd composeApp/build/dist/wasmJs/productionExecutable
        git init
        git config user.name "DBSLettaBot"
        git config user.email "noreply@letta.com"
        git add -A
        git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        git push -f https://x-access-token:${GPR_TOKEN}@github.com/RhoMancer/AngusSoftwareApp.git HEAD:gh-pages
    environment:
      GRADLE_USER_HOME: /root/.gradle
    volumes:
      - gradle-cache-angusapp:/root/.gradle/caches
      - gradle-wrapper-angusapp:/root/.gradle/wrapper

  build-android:
    image: localhost:5000/ci-theming-jdk23:latest
    commands:
      # Install Android SDK
      - |
        if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        else
          echo "Android SDK cached, skipping install"
        fi
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || true
        echo "sdk.dir=$ANDROID_HOME" > local.properties
      # Decode signing keystore from base64
      - |
        mkdir -p ~/.gradle
        echo "githubUser=${GPR_USERNAME}" >> ~/.gradle/gradle.properties
        echo "githubToken=${GPR_TOKEN}" >> ~/.gradle/gradle.properties
        echo "${ANGUSAPP_KEYSTORE_BASE64}" | base64 -d > /tmp/angusapp-upload.jks
        echo "storeFile=/tmp/angusapp-upload.jks" > keystore.properties
        echo "storePassword=${ANGUSAPP_KEYSTORE_PASSWORD}" >> keystore.properties
        echo "keyAlias=${ANGUSAPP_KEY_ALIAS}" >> keystore.properties
        echo "keyPassword=${ANGUSAPP_KEY_PASSWORD}" >> keystore.properties
      # Build signed release APK + AAB
      - chmod +x gradlew
      - ./gradlew --no-daemon :composeApp:assembleRelease :composeApp:bundleRelease
      # Upload APK to GitHub Release
      - |
        TAG_NAME=$(echo "${CI_COMMIT_BRANCH}" | sed 's|release/||')
        gh release create "$TAG_NAME" composeApp/build/outputs/apk/release/*.apk --title "$TAG_NAME" --notes "Release $TAG_NAME"
    environment:
      GRADLE_USER_HOME: /root/.gradle
      ANDROID_HOME: /opt/android-sdk
    volumes:
      - gradle-cache-angusapp:/root/.gradle/caches
      - gradle-wrapper-angusapp:/root/.gradle/wrapper
      - android-sdk-angusapp:/opt/android-sdk
