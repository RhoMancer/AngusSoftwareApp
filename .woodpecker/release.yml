when:
  - event: push
    branch: [release/*]

steps:
  deploy-web:
    image: localhost:5000/ci-theming-jdk23:latest
    commands:
      # Configure GPR credentials
      - |
        mkdir -p ~/.gradle
        echo "githubUser=${GPR_USERNAME}" >> ~/.gradle/gradle.properties
        echo "githubToken=${GPR_TOKEN}" >> ~/.gradle/gradle.properties
      - chmod +x gradlew
      # Build Wasm distribution
      - ./gradlew --no-daemon :composeApp:wasmJsBrowserDistribution
      # Prepare gh-pages content + cache-bust script tags
      - |
        touch composeApp/build/dist/wasmJs/productionExecutable/.nojekyll
        cp -r static/. composeApp/build/dist/wasmJs/productionExecutable/
        # Write version.txt from gradle.properties into build output
        APP_VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
        echo -n "$APP_VERSION" > composeApp/build/dist/wasmJs/productionExecutable/version.txt
        # Add cache-busting query param to script/css tags so CDN serves fresh content
        export BUILD_TS=$(date -u +%s)
        INDEX=composeApp/build/dist/wasmJs/productionExecutable/index.html
        sed -i "s|composeApp.js|composeApp.js?v=$BUILD_TS|g" "$INDEX"
        sed -i "s|network.js|network.js?v=$BUILD_TS|g" "$INDEX"
        sed -i "s|installPrompt.js|installPrompt.js?v=$BUILD_TS|g" "$INDEX"
        sed -i "s|styles.css|styles.css?v=$BUILD_TS|g" "$INDEX"
      # Deploy to gh-pages branch
      - |
        cd composeApp/build/dist/wasmJs/productionExecutable
        git init
        git config user.name "DBSLettaBot"
        git config user.email "noreply@letta.com"
        git add -A
        git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        git push -f https://x-access-token:${GPR_TOKEN}@github.com/RhoMancer/AngusSoftwareApp.git HEAD:gh-pages
    environment:
      GRADLE_USER_HOME: /root/.gradle
    volumes:
      - gradle-cache-angusapp:/root/.gradle/caches
      - gradle-wrapper-angusapp:/root/.gradle/wrapper

  build-android:
    image: localhost:5000/ci-theming-jdk23:latest
    commands:
      # Install Android SDK
      - |
        if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        else
          echo "Android SDK cached, skipping install"
        fi
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || true
        echo "sdk.dir=$ANDROID_HOME" > local.properties
      # Decode signing keystore from base64
      - |
        mkdir -p ~/.gradle
        echo "githubUser=${GPR_USERNAME}" >> ~/.gradle/gradle.properties
        echo "githubToken=${GPR_TOKEN}" >> ~/.gradle/gradle.properties
        printf '%s' "${ANGUSAPP_KEYSTORE_BASE64}" | base64 -d > /tmp/angusapp-upload.jks
        ls -la /tmp/angusapp-upload.jks
        keytool -list -keystore /tmp/angusapp-upload.jks -storepass "${ANGUSAPP_KEYSTORE_PASSWORD}" -alias "${ANGUSAPP_KEY_ALIAS}" || echo "KEYSTORE VERIFY FAILED"
        echo "storeFile=/tmp/angusapp-upload.jks" > keystore.properties
        echo "storePassword=${ANGUSAPP_KEYSTORE_PASSWORD}" >> keystore.properties
        echo "keyAlias=${ANGUSAPP_KEY_ALIAS}" >> keystore.properties
        echo "keyPassword=${ANGUSAPP_KEY_PASSWORD}" >> keystore.properties
      # Build signed release APK + AAB
      - chmod +x gradlew
      - ./gradlew --no-daemon :composeApp:assembleRelease :composeApp:bundleRelease
      # Create GitHub Release and upload APK via API (no gh CLI in image)
      - |
        TAG_NAME=$(echo "${CI_COMMIT_BRANCH}" | sed 's|release/||')
        APK_PATH=$(find composeApp/build/outputs/apk/release/ -name "*.apk" | head -1)
        if [ -n "$APK_PATH" ]; then
          NOTES="Release ${TAG_NAME}"
          # Create release (best-effort, don't fail build on upload issues)
          ESCAPED_NOTES=$(printf '%s' "$NOTES" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          wget -q --post-data="{\"tag_name\":\"${TAG_NAME}\",\"target_commitish\":\"master\",\"name\":\"${TAG_NAME}\",\"body\":${ESCAPED_NOTES}}" \
            --header="Authorization: token ${GPR_TOKEN}" \
            --header="Content-Type: application/json" \
            "https://api.github.com/repos/RhoMancer/AngusSoftwareApp/releases" -O /dev/null || true
          # Upload APK
          wget -q --post-file="$APK_PATH" \
            --header="Authorization: token ${GPR_TOKEN}" \
            --header="Content-Type: application/octet-stream" \
            "https://uploads.github.com/repos/RhoMancer/AngusSoftwareApp/releases/tags/${TAG_NAME}/assets?name=$(basename $APK_PATH)" \
            -O /dev/null || true
        else
          echo "No APK found"
        fi
      # Upload AAB to Google Play Store (non-fatal)
      - |
        AAB_PATH=$(find composeApp/build/outputs/bundle/release/ -name "*.aab" | head -1)
        if [ -z "$AAB_PATH" ]; then
          echo "WARNING: No AAB found, skipping Play Store upload"
        elif [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_B64" ]; then
          echo "WARNING: GOOGLE_PLAY_SERVICE_ACCOUNT_B64 not set, skipping Play Store upload"
        else
          echo "Uploading AAB to Google Play Store..."
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_B64" | base64 -d > /tmp/service-account.json
          pip3 install --quiet --break-system-packages PyJWT cryptography requests 2>&1
          cat > /tmp/upload-play.py << 'PYEOF'
        import json, os, sys
        from datetime import datetime, timedelta
        import jwt, requests
        KEY_FILE = json.load(open('/tmp/service-account.json'))
        PACKAGE = os.environ.get('PLAY_PACKAGE', 'dev.angussoftware.app')
        AAB_PATH = os.environ.get('AAB_PATH')
        TRACK = os.environ.get('PLAY_TRACK', 'internal')
        TIMEOUT = 300
        def check(r):
            if not r.ok:
                print(f'FAILED: {r.status_code}: {r.text}', file=sys.stderr)
                sys.exit(1)
        print('obtaining access token...')
        now = datetime.now()
        claim = {'iss': KEY_FILE['client_email'], 'scope': 'https://www.googleapis.com/auth/androidpublisher', 'aud': 'https://oauth2.googleapis.com/token', 'exp': str(int((now + timedelta(minutes=10)).timestamp())), 'iat': str(int(now.timestamp()))}
        assertion = jwt.encode(payload=claim, key=KEY_FILE['private_key'].encode(), algorithm='RS256', headers={'alg': 'RS256', 'typ': 'JWT'})
        r = requests.post('https://oauth2.googleapis.com/token', data={'grant_type': 'urn:ietf:params:oauth:grant-type:jwt-bearer', 'assertion': assertion}, timeout=TIMEOUT)
        check(r)
        token = r.json()['access_token']
        hdrs = {'Authorization': f'Bearer {token}'}
        print('creating edit...')
        r = requests.post(f'https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{PACKAGE}/edits', json={'expiryTimeSeconds': str(int((now + timedelta(minutes=10)).timestamp()))}, headers=hdrs, timeout=TIMEOUT)
        check(r)
        edit_id = r.json()['id']
        print(f'edit_id={edit_id}')
        print('uploading aab...')
        with open(AAB_PATH, 'rb') as f:
            r = requests.post(f'https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/{PACKAGE}/edits/{edit_id}/bundles', data=f.read(), headers={**hdrs, 'Content-Type': 'application/octet-stream'}, timeout=TIMEOUT)
        check(r)
        vc = r.json()['versionCode']
        print(f'uploaded version_code={vc}')
        print(f'assigning to {TRACK} track...')
        r = requests.put(f'https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{PACKAGE}/edits/{edit_id}/tracks/{TRACK}', json={'releases': [{'status': 'completed', 'versionCodes': [str(vc)]}]}, headers={**hdrs, 'Content-Type': 'application/json'}, timeout=TIMEOUT)
        check(r)
        print(f'assigned to {TRACK}')
        print('committing edit...')
        r = requests.post(f'https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{PACKAGE}/edits/{edit_id}:commit', headers=hdrs, timeout=TIMEOUT)
        check(r)
        print(f'done - published {vc} to {TRACK}')
        PYEOF
          export AAB_PATH
          set +e
          python3 /tmp/upload-play.py 2>&1
          PLAY_RESULT=$?
          set -e
          if [ $PLAY_RESULT -ne 0 ]; then
            echo "WARNING: Play Store upload failed (non-fatal, exit=$PLAY_RESULT)"
          else
            echo "Play Store upload and publish successful"
          fi
          rm -f /tmp/service-account.json
        fi
        rm -f /tmp/angusapp-upload.jks
    environment:
      GRADLE_USER_HOME: /root/.gradle
      ANDROID_HOME: /opt/android-sdk
    volumes:
      - gradle-cache-angusapp:/root/.gradle/caches
      - gradle-wrapper-angusapp:/root/.gradle/wrapper
      - android-sdk-angusapp:/opt/android-sdk
