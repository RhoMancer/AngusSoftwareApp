depends_on:
  - build

platform: linux/amd64
privileged: true

steps:
  - name: boot-emulator
    image: codycraven/android-33-emulator:latest
    environment:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
    commands:
      - echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
      - echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n test -k "system-images;android-33;google_apis;x86_64" --force --device "Nexus 6"
      - >
        nohup $ANDROID_HOME/emulator/emulator -avd test
        -no-window -gpu swiftshader_indirect -no-audio
        -no-boot-anim -memory 2048 -no-snapshot
        -no-metrics -partition-size 2048 -read-only &
      - |
        timeout 180 $ANDROID_HOME/platform-tools/adb wait-for-device
        $ANDROID_HOME/platform-tools/adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'

  - name: run-tests
    image: codycraven/android-33-emulator:latest
    environment:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
    commands:
      - timeout 120 $ANDROID_HOME/platform-tools/adb wait-for-device
      - |
        max_wait=60
        waited=0
        while [ $waited -lt $max_wait ]; do
          result=$($ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
          if [ "$result" = "1" ]; then
            echo "Boot completed after ${waited}s"
            break
          fi
          sleep 1
          waited=$((waited + 1))
        done
        if [ $waited -ge $max_wait ]; then
          echo "WARNING: Emulator boot timeout after ${max_wait}s"
        fi
      - ./gradlew --no-daemon :composeApp:connectedDebugAndroidTest :composeApp:androidConnectedTestCoverageReport
      - |
        if [ -f /shared/kover/$$CI_COMMIT_SHA/report.xml ]; then
          mkdir -p composeApp/build/reports/kover
          cp /shared/kover/$$CI_COMMIT_SHA/report.xml composeApp/build/reports/kover/report.xml
        else
          echo "WARNING: No staged Kover XML found, generating locally"
          ./gradlew --no-daemon :composeApp:koverXmlReport
        fi
      - ./gradlew --no-daemon -PskipJaCoCoRegen :composeApp:unifiedCoverageReport
      - cat composeApp/build/reports/coverage/UNIFIED_COVERAGE.md
      - echo "=== ALL KOVER CLASS NAMES ==="
      - grep '<class' composeApp/build/reports/kover/report.xml | sed 's/.*name="//' | sed 's/".*//' | sort -u
      - sh scripts/verify-combined-coverage.sh composeApp/build/reports/coverage/UNIFIED_COVERAGE.md 38 53
    volumes:
      - gradle-cache-angusapp:/root/.gradle/caches
      - gradle-wrapper-angusapp:/root/.gradle/wrapper
      - android-sdk-angusapp:/opt/android-sdk
      - kover-xml-angusapp:/shared/kover
