when:
  - event: [push, pull_request]
    branch: [master, main]

steps:
  build:
    image: localhost:5000/ci-theming-jdk23:latest
    commands:
      # Install Android SDK (required by AGP even for JVM tests)
      - |
        if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        else
          echo "Android SDK cached, skipping install"
        fi
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || true
        echo "sdk.dir=$ANDROID_HOME" > local.properties
      # Configure GPR credentials
      - |
        mkdir -p ~/.gradle
        echo "githubUser=${GPR_USERNAME}" >> ~/.gradle/gradle.properties
        echo "githubToken=${GPR_TOKEN}" >> ~/.gradle/gradle.properties
      - chmod +x gradlew
      # Run unit tests + generate Kover XML (NO koverVerify — that runs in emulator
      # pipeline after unified coverage with instrumented tests is available)
      - ./gradlew --no-daemon :composeApp:testDebugUnitTest :composeApp:koverXmlReport
      # Stage kover XML for emulator pipeline to consume
      - |
        if [ -f composeApp/build/reports/kover/report.xml ]; then
          mkdir -p /shared/kover/${CI_COMMIT_SHA}
          cp composeApp/build/reports/kover/report.xml /shared/kover/${CI_COMMIT_SHA}/report.xml
          echo "=== Staged kover XML for emulator pipeline ==="
          ls -la /shared/kover/${CI_COMMIT_SHA}/
          echo "=== KOVER MISSED CLASSES ==="
          sh scripts/kover-perclass.sh
          find /shared/kover -mindepth 1 -maxdepth 1 -type d -mtime +1 -exec rm -rf {} + 2>/dev/null || true
        else
          echo "WARNING: kover XML not found — emulator pipeline will need to regenerate"
        fi
    environment:
      GRADLE_USER_HOME: /root/.gradle
      ANDROID_HOME: /opt/android-sdk
    volumes:
      - gradle-cache-angusapp:/root/.gradle/caches
      - gradle-wrapper-angusapp:/root/.gradle/wrapper
      - android-sdk-angusapp:/opt/android-sdk
      # Shared volume — kover XML staged here for emulator pipeline
      - kover-xml-angusapp:/shared/kover

  validate-commits:
    image: alpine:latest
    commands:
      - apk add --no-cache git bash
      - git clone https://x-access-token:${GPR_TOKEN}@github.com/RhoMancer/ci-scripts.git /tmp/ci-scripts
      - bash /tmp/ci-scripts/scripts/validate-commits.sh "origin/master...HEAD"
    when:
      event: pull_request

  auto-tag:
    image: alpine:latest
    commands:
      - apk add --no-cache git bash curl
      - git clone https://x-access-token:${GPR_TOKEN}@github.com/RhoMancer/ci-scripts.git /tmp/ci-scripts
      - git fetch --tags "https://x-access-token:${GPR_TOKEN}@github.com/RhoMancer/AngusSoftwareApp.git" 2>&1 || true
      - REPO=RhoMancer/AngusSoftwareApp sh /tmp/ci-scripts/scripts/auto-tag.sh
    when:
      event: push
      branch: master
